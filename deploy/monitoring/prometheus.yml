# Prometheus scrape config for the food-delivery monitoring profile (#73).
# The API exposes /metrics on its internal port; Prometheus reaches it over
# the Docker network (the path is 404'd on the public origin by Caddy).
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: food-delivery-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8080"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
