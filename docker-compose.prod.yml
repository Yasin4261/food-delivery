# Production stack: Postgres (internal only) + Go API (internal only) + Caddy
# serving the built SPA and proxying /api — everything on ONE public origin.
#
#   cp .env.prod.example .env.prod   # fill the required values
#   make prod                        # builds with the git version stamped
#
# Compose fails fast (${VAR:?...}) on missing secrets; the API additionally
# fail-fasts in ENV=production on weak/missing config.
services:
  db:
    image: postgres:16-alpine
    container_name: food_delivery_db_prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-food_delivery}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env.prod}
    # No host port: the database is reachable only on the internal network.
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    networks: [prod]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-food_delivery}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-prod}
    container_name: food_delivery_api_prod
    restart: unless-stopped
    # No host port: only Caddy talks to the API.
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: "8080"
      ENV: "production"
      # In-network Postgres traffic; the container network is not TLS-enabled.
      DATABASE_URL: "postgres://${DB_USER:-postgres}:${DB_PASSWORD}@db:5432/${DB_NAME:-food_delivery}?sslmode=disable"
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env.prod (openssl rand -hex 32)}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-24h}
      APP_BASE_URL: ${APP_BASE_URL:?set APP_BASE_URL to the public origin}
      ALLOWED_ORIGINS: ${APP_BASE_URL}
      SMTP_HOST: ${SMTP_HOST:?set SMTP_HOST in .env.prod}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:?set MAIL_FROM in .env.prod}
      IYZICO_API_KEY: ${IYZICO_API_KEY:?set IYZICO_API_KEY in .env.prod}
      IYZICO_SECRET_KEY: ${IYZICO_SECRET_KEY:?set IYZICO_SECRET_KEY in .env.prod}
      IYZICO_BASE_URL: ${IYZICO_BASE_URL:-https://sandbox-api.iyzipay.com}
      AUTO_MIGRATE: "true"
      UPLOAD_DIR: "/app/uploads"
      TIMEZONE: ${TIMEZONE:-Europe/Istanbul}
      DELIVERY_BASE_FEE: ${DELIVERY_BASE_FEE:-0}
      DELIVERY_FEE_PER_KM: ${DELIVERY_FEE_PER_KM:-0}
      COMMISSION_PERCENT: ${COMMISSION_PERCENT:-0}
    volumes:
      # Uploaded photos must survive container restarts/redeploys.
      - uploads_data:/app/uploads
    networks: [prod]
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: food_delivery_web_prod
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    environment:
      # ":80" = plain HTTP (local test / behind a load balancer);
      # "your-domain.com" = automatic HTTPS via Let's Encrypt.
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
    depends_on:
      api:
        condition: service_healthy
    networks: [prod]
    volumes:
      - caddy_data:/data
      - caddy_config:/config

  # Nightly pg_dump + uploads snapshot with retention (#74). Backups land on
  # the HOST (./backups) so they survive `docker compose down -v`; copy them
  # off-site too — a backup on the same disk is only half a backup.
  db-backup:
    image: postgres:16-alpine
    container_name: food_delivery_backup
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGHOST: db
      PGUSER: ${DB_USER:-postgres}
      PGPASSWORD: ${DB_PASSWORD}
      PGDATABASE: ${DB_NAME:-food_delivery}
      BACKUP_SCHEDULE: ${BACKUP_SCHEDULE:-0 3 * * *}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
    volumes:
      - ./backups:/backups
      - ./deploy/backup/backup.sh:/usr/local/bin/backup.sh:ro
      - ./deploy/backup/entrypoint.sh:/usr/local/bin/backup-entrypoint.sh:ro
      - uploads_data:/uploads:ro
    entrypoint: ["/usr/local/bin/backup-entrypoint.sh"]
    networks: [prod]
    security_opt:
      - no-new-privileges:true

volumes:
  postgres_data_prod:
    driver: local
  caddy_data:
    driver: local
  uploads_data:
    driver: local
  caddy_config:
    driver: local

networks:
  prod:
    driver: bridge
