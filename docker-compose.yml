services:
  # PostgreSQL database
  db:
    image: postgres:16-alpine
    container_name: food_delivery_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: food_delivery
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - food_delivery_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d food_delivery"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Go API. Runs golang-migrate on startup (AUTO_MIGRATE=true).
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: food_delivery_api
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: "8080"
      ENV: "development"
      DATABASE_URL: "postgres://postgres:postgres123@db:5432/food_delivery?sslmode=disable"
      # Read from the environment (.env); the fallback is a clearly insecure
      # dev-only value, never a production secret. Generate one with
      # `openssl rand -hex 32`.
      JWT_SECRET: "${JWT_SECRET:-dev-secret-key-not-for-production}"
      JWT_EXPIRATION: "24h"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-http://localhost:3000}"
      # Emailed links (password reset) open the SPA, not the API.
      APP_BASE_URL: "${APP_BASE_URL:-http://localhost:5173}"
      AUTO_MIGRATE: "true"
      UPLOAD_DIR: "/app/uploads"
    volumes:
      - uploads_data:/app/uploads
    networks:
      - food_delivery_network

  # Adminer: lightweight web UI for the database (http://localhost:8081).
  adminer:
    image: adminer:latest
    container_name: food_delivery_adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
    depends_on:
      - db
    networks:
      - food_delivery_network

volumes:
  postgres_data:
  uploads_data:
    driver: local

networks:
  food_delivery_network:
    driver: bridge
