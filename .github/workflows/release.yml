name: 🚀 Release

# On a version tag (vX.Y.Z) build the API + web images, push them to GHCR
# stamped with the tag, and — when deploy secrets are present — roll the
# production host to that tag. The tag is the single source of truth: the same
# TAG selects the images that compose pulls (see docker-compose.prod.yml).
on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # tags for `git describe`

      - name: 🔖 Derive version + image prefix
        id: version
        run: |
          echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "version=$(git describe --tags --always)" >> "$GITHUB_OUTPUT"
          # GHCR names must be lowercase; the owner login may be mixed-case.
          echo "prefix=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/food-delivery" >> "$GITHUB_OUTPUT"

      - name: 🔧 Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐹 Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
          push: true
          tags: |
            ${{ steps.version.outputs.prefix }}-api:${{ steps.version.outputs.tag }}
            ${{ steps.version.outputs.prefix }}-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🌐 Build & push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.web
          push: true
          tags: |
            ${{ steps.version.outputs.prefix }}-web:${{ steps.version.outputs.tag }}
            ${{ steps.version.outputs.prefix }}-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: build-and-push
    # Deploy only when the host is configured; forks and secret-less repos just
    # publish images. Gate behind an environment for required-reviewer control.
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    environment: production
    steps:
      - name: 🚀 Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          # DEPLOY_PATH holds the checkout with .env.prod on the server.
          # Pull the freshly built images for this tag and roll the stack;
          # --no-build so the host never compiles (it just pulls).
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            git fetch --tags --quiet
            git checkout --quiet "${{ github.ref_name }}"
            export TAG="${{ github.ref_name }}"
            docker compose -f docker-compose.prod.yml --env-file .env.prod pull
            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --no-build
            docker image prune -f
            # Smoke-check the new version answers before we call it done.
            sleep 5
            curl -fsS http://localhost/health

      - name: ✅ Summary
        run: echo "Deployed ${{ github.ref_name }} to production."
