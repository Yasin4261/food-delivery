name: 🧪 Test Suite

on:
  push:
    branches: [main, develop, "rebuild/**"]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐹 Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: 📦 Download dependencies
        run: go mod download

      - name: 🔎 Vet
        run: go vet ./...

      - name: 🎨 Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-ed:"
            echo "$unformatted"
            exit 1
          fi

      - name: 🏗️ Build
        run: go build ./...

      - name: 🧪 Test (race + coverage)
        run: go test -race -coverprofile=coverage.out ./...

      - name: 📊 Coverage summary
        run: go tool cover -func=coverage.out | tail -1

  integration:
    name: Integration tests (Postgres + Redis)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: food_delivery_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d food_delivery_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐹 Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: 📦 Download dependencies
        run: go mod download

      - name: 🧪 Repository + redisstore integration tests
        env:
          TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5433/food_delivery_test?sslmode=disable
          TEST_REDIS_URL: redis://localhost:6380/0
        run: go test -tags=integration ./internal/repository/... ./internal/redisstore/...

  web:
    name: Web build (Vue)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🧪 Test (Vitest)
        run: npm test

      - name: 🏗️ Build
        run: npm run build

      - name: 🔒 Audit (production deps)
        run: npm audit --omit=dev --audit-level=high

  e2e:
    name: E2E smoke (Playwright)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: food_delivery
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d food_delivery"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐹 Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: 🚀 Build & start API
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/food_delivery?sslmode=disable
          JWT_SECRET: e2e-ci-secret
          ENV: development
          AUTO_MIGRATE: "true"
          APP_BASE_URL: http://localhost:5173
          PORT: "8080"
        run: |
          go build -o /tmp/api ./cmd/api
          nohup /tmp/api > /tmp/api.log 2>&1 &
          for i in $(seq 1 30); do curl -fsS http://localhost:8080/health && break; sleep 2; done

      - name: 📦 Install web dependencies
        working-directory: web
        run: npm ci

      - name: 🎭 Install Playwright browser
        working-directory: web
        run: npx playwright install --with-deps chromium

      - name: 🧪 E2E smoke
        working-directory: web
        run: npx playwright test

      - name: 📎 Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-failure
          path: |
            web/playwright-report/
            web/test-results/
            /tmp/api.log

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐳 Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: food-delivery-api:ci
