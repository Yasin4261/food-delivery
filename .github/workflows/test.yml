name: 🧪 Test Suite

on:
  push:
    branches: [main, develop, "rebuild/**"]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐹 Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: 📦 Download dependencies
        run: go mod download

      - name: 🔎 Vet
        run: go vet ./...

      - name: 🎨 Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-ed:"
            echo "$unformatted"
            exit 1
          fi

      - name: 🏗️ Build
        run: go build ./...

      - name: 🧪 Test (race + coverage)
        run: go test -race -coverprofile=coverage.out ./...

      - name: 📊 Coverage summary
        run: go tool cover -func=coverage.out | tail -1

  integration:
    name: Integration tests (Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: food_delivery_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d food_delivery_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐹 Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: 📦 Download dependencies
        run: go mod download

      - name: 🧪 Repository integration tests
        env:
          TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5433/food_delivery_test?sslmode=disable
        run: go test -tags=integration ./internal/repository/...

  web:
    name: Web build (Vue)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Build
        run: npm run build

      - name: 🔒 Audit (production deps)
        run: npm audit --omit=dev --audit-level=high

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐳 Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: food-delivery-api:ci
